version: "4.1"
name: Project1
type: ARM
deviceName: null
packDir: .pack/Keil/STM32F1xx_DFP.2.3.0
srcDirs:
  - ../User
  - ../Function
  - ../Start
  - ../Libraries
virtualFolder:
  name: <virtual_root>
  files: []
  folders: []
dependenceList: []
outDir: build
miscInfo:
  uid: d1a8b8cfc733fba62f0a011178676bfe
targets:
  Debug:
    cppPreprocessAttrs:
      # ╔══════════════════════════════════════════════════════════╗
      # ║  ★ 切换板子：改下面 define + scatterFilePath 两行 ★  ║
      # ╠══════════════════════════════════════════════════════════╣
      # ║  F103C8T6/CBT6 (MD): STM32F10X_MD   + STM32F103x_FLASH.ld  ║
      # ║  F103ZET6/VCT6 (HD): STM32F10X_HD   + STM32F103x_FLASH.ld  ║
      # ║  F103RGT6/IGT6 (XL): STM32F10X_XL   + STM32F103x_XL.ld     ║
      # ║  F105/F107    (CL): STM32F10X_CL   + STM32F103x_FLASH.ld  ║
      # ╚══════════════════════════════════════════════════════════╝
      defineList:
        - STM32F10X_HD
        - USE_STDPERIPH_DRIVER
      incList:
        - .
        - ../Libraries
        - ../Start
        - ../Function
        - ../User
      libList: []
    excludeList:
      - ../Start/*.s
      - ../Start/startup_*.s
    settings:
      debugger: cortex-debug
    toolchain: GCC
    toolchainConfigMap:
      GCC:
        archExtensions: ""
        cpuType: Cortex-M3
        floatingPointHardware: none
        options:
          version: 5
          afterBuildTasks: []
          asm-compiler:
            ASM_FLAGS: ""
          beforeBuildTasks: []
          c/cpp-compiler:
            CXX_FLAGS: ""
            C_FLAGS: ""
            language-c: c11
            language-cpp: c++11
            one-elf-section-per-data: true
            one-elf-section-per-function: true
            optimization: level-debug
            warnings: all-warnings
          global:
            $float-abi-type: hard
            misc-control: ""
            not-use-syscalls: true
            output-debug-info: enable
            use-newlib-nano: true
          linker:
            $outputTaskExcludes:
              - .bin
            LD_FLAGS: ""
            LIB_FLAGS: -lm
            output-format: elf
            remove-unused-input-sections: true
        scatterFilePath: D:\26 vscode project\STM32F103x_FLASH.ld
        storageLayout:
          RAM: []
          ROM: []
        useCustomScatterFile: true
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: "null"
          vendor: "null"
        otherCmds: ""
        proType: 1
        speed: 8000
      STLink:
        address: "0x08000000"
        bin: ""
        elFile: None
        optionBytes: .eide/debug.st.option.bytes.ini
        otherCmds: ""
        proType: SWD
        resetMode: default
        runAfterProgram: true
        speed: 4000
    uploader: STLink
